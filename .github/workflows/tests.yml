name: tests
on: [push, pull_request]
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: black --check src tests
      # Coverage gate. Measured baseline on main was ~93% (2026-05); the
      # floor is set to 90% (current value rounded DOWN to the nearest 5%)
      # so routine refactors don't break CI while still catching meaningful
      # regressions. Raise this floor in a follow-up PR once coverage is
      # consistently higher.
      - run: pytest -v --cov=bvidfe --cov-report=xml --cov-report=term --cov-fail-under=90
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  validation:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: "Validation: empirical tier (hard gate)"
        run: python validation/validate_bvid_public.py --gate
      - name: "Validation: fe3d tier (monitoring; first 3 cases)"
        # fe3d takes ~10-12 s per case so we cap at the first 3 to keep
        # CI under ~45 s. The gate multiplier is 2.0 (vs 1.25 for the
        # empirical hard gate) to acknowledge fe3d's energy-flatness
        # caveat — failures here are advisory, not blocking.
        run: python validation/validate_bvid_public.py --gate --tier=fe3d --max-cases=3
        continue-on-error: true
